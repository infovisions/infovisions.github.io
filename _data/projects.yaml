- title: "From Charts to Context: An Ecological View of Visualization Literacy"
  subtitle: "CHI 2026 · Workshop on Data Literacy"
  status: active
  image: images/projects/eco-vis-literacy.png
  description: >
    Visualization literacy is traditionally defined as an individual's ability to decode
    charts—but interpretation is shaped by far more than cognition alone. This project
    applies Bronfenbrenner's Ecological Systems Theory to propose a layered framework
    spanning personal experience, institutional framing, cultural norms, and temporal
    context. The goal is a shared scaffold that lets visualization educators coordinate
    with adjacent disciplines like media and information literacy rather than reinvent them.

